name: CD - AWS Deployment

on:
  workflow_run:
    workflows: ["CI - Test & Security"]
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          # Use the SHA from the workflow that triggered this one
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }} 
        run: |
          echo "Building Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          echo "Pushing Docker image..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update SSM Parameter
        env:
          IMAGE_TAG: ${{ steps.build-image.outputs.image_tag }}
        run: |
          echo "Updating SSM Parameter Store to tag: $IMAGE_TAG"
          aws ssm put-parameter \
            --name ${{ secrets.SSM_PARAMETER_NAME }} \
            --value $IMAGE_TAG \
            --type String \
            --overwrite

      - name: Trigger ASG Rolling Update
        run: |
          echo "Triggering zero-downtime Instance Refresh..."
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ secrets.ASG_NAME }}